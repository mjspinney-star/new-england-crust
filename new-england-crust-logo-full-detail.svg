<?xml version="1.0" encoding="UTF-8"?>
<!--
  NEW ENGLAND CRUST — Full Detail Logo
  Version: 1.0
  Use: Web, Print, Business Cards
  Dimensions: 680 × 680px (scalable)
  Colors:
    Background:   #120E08
    Outer ring:   #D4832A (Ember Amber)
    Inner rings:  #F5EFE0 (Warm Cream)
    Arc text top: #F5EFE0 (Warm Cream)
    Arc text bot: #D4832A (Ember Amber)
    Flame outer:  #C84B2E (Coral Red)
    Flame mid:    #E8943A (Ember Orange)
    Flame inner:  #F4C042 (Gold)
    Flame core:   #FFEFAA (Pale Gold)
    Wordmark:     #F5EFE0 (Warm Cream)
    Rule/diamond: #D4832A (Ember Amber)
-->
<svg
  version="1.1"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 680 680"
  width="680"
  height="680"
  aria-label="New England Crust logo"
  role="img">

  <title>New England Crust</title>
  <desc>New England Crust badge logo — leaning flame, Ember Amber, full detail version</desc>

  <defs>
    <!-- Top arc path for "· NEW ENGLAND ·" text -->
    <path id="nec-arc-top" d="M 72,340 A 268,268 0 0,1 608,340" fill="none"/>
    <!-- Bottom arc path for "SALT AIR & OPEN FLAME" text -->
    <path id="nec-arc-bottom" d="M 72,340 A 268,268 0 0,0 608,340" fill="none"/>
  </defs>

  <!-- ── BADGE BACKGROUND ── -->
  <circle cx="340" cy="340" r="294" fill="#120E08"/>

  <!-- ── RINGS ── -->
  <!-- Outer ring: Ember Amber, bold -->
  <circle cx="340" cy="340" r="292" fill="none" stroke="#D4832A" stroke-width="3"/>
  <!-- Second ring: Warm Cream, subtle -->
  <circle cx="340" cy="340" r="278" fill="none" stroke="#F5EFE0" stroke-width="1" opacity="0.2"/>
  <!-- Inner dashed ring: Warm Cream, very subtle -->
  <circle cx="340" cy="340" r="254" fill="none" stroke="#F5EFE0" stroke-width="1" stroke-dasharray="4,8" opacity="0.15"/>

  <!-- ── ARC TEXT ── -->
  <!-- Top: · NEW ENGLAND · -->
  <text font-size="22" font-weight="600" fill="#F5EFE0" font-family="Georgia, 'Times New Roman', serif" letter-spacing="5">
    <textPath href="#nec-arc-top" startOffset="50%" text-anchor="middle">· NEW ENGLAND ·</textPath>
  </text>
  <!-- Bottom: SALT AIR & OPEN FLAME -->
  <text font-size="14" font-weight="600" fill="#D4832A" font-family="Georgia, 'Times New Roman', serif" letter-spacing="4.5">
    <textPath href="#nec-arc-bottom" startOffset="50%" text-anchor="middle">SALT AIR &amp; OPEN FLAME</textPath>
  </text>

  <!-- ── LEANING FLAMES ── -->
  <!-- Left flame — outer body -->
  <path d="M 298,218 C 308,242 304,266 292,285 C 278,262 278,236 298,218 Z" fill="#C84B2E" opacity="0.75"/>
  <!-- Left flame — inner amber -->
  <path d="M 298,238 C 306,254 303,270 293,281 C 282,268 282,250 298,238 Z" fill="#E8943A" opacity="0.90"/>

  <!-- Right flame — outer body -->
  <path d="M 362,210 C 374,236 372,260 358,282 C 344,260 344,234 362,210 Z" fill="#C84B2E" opacity="0.75"/>
  <!-- Right flame — inner amber -->
  <path d="M 362,232 C 371,250 369,268 358,279 C 347,267 347,248 362,232 Z" fill="#E8943A" opacity="0.90"/>

  <!-- Center flame — layer 1: coral red outer body with lean -->
  <path d="M 340,138 C 368,172 360,230 330,280 C 308,244 312,182 340,138 Z" fill="#C84B2E"/>
  <!-- Center flame — layer 2: ember orange -->
  <path d="M 338,162 C 362,194 354,242 328,278 C 310,248 316,196 338,162 Z" fill="#E8943A"/>
  <!-- Center flame — layer 3: gold inner -->
  <path d="M 336,190 C 354,216 348,252 328,272 C 314,252 318,218 336,190 Z" fill="#F4C042"/>
  <!-- Center flame — layer 4: pale gold core -->
  <path d="M 334,215 C 346,232 342,256 328,268 C 318,256 320,234 334,215 Z" fill="#FFEFAA" opacity="0.46"/>

  <!-- ── EMBER GLOW ── -->
  <ellipse cx="332" cy="287" rx="54" ry="11" fill="#E8943A" opacity="0.15"/>
  <circle cx="314" cy="291" r="2.5" fill="#F4C042" opacity="0.44"/>
  <circle cx="350" cy="290" r="2.5" fill="#F4C042" opacity="0.44"/>
  <circle cx="332" cy="294" r="2"   fill="#E8943A" opacity="0.36"/>
  <circle cx="300" cy="288" r="1.8" fill="#E8943A" opacity="0.28"/>
  <circle cx="364" cy="288" r="1.8" fill="#E8943A" opacity="0.28"/>

  <!-- ── CRUST WORDMARK ── -->
  <text
    x="340" y="375"
    font-size="74"
    font-weight="700"
    fill="#F5EFE0"
    font-family="Georgia, 'Times New Roman', serif"
    text-anchor="middle"
    letter-spacing="12">CRUST</text>

  <!-- ── DIAMOND RULE ── -->
  <line x1="120" y1="396" x2="286" y2="396" stroke="#D4832A" stroke-width="1.5" opacity="0.55"/>
  <polygon points="340,390 345,396 340,402 335,396" fill="#D4832A" opacity="0.65"/>
  <line x1="394" y1="396" x2="560" y2="396" stroke="#D4832A" stroke-width="1.5" opacity="0.55"/>

  <!-- ── EST. 2025 ── -->
  <text
    x="340" y="422"
    font-size="13"
    fill="#F5EFE0"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.45">Est. 2025</text>

</svg>

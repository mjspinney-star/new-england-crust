name: Generate Weekly Blog Post

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC (5:00 AM Eastern)
    - cron: '0 9 * * 4'  # Every Thursday at 9:00 AM UTC (5:00 AM Eastern)
  workflow_dispatch:      # Also allows manual trigger from GitHub Actions tab

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-post.js

      - name: Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git commit -m "Auto-generate blog post: $(date +'%Y-%m-%d')"
          git push

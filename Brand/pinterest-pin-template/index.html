<!-- @template name="Pinterest Pin" description="1000×1500 pin — photo top, headline bottom, badge mark. Dark artisan editorial." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinterest Pin — New England Crust</title>
<script src="./ds-base.js"></script>
<style>
  /* ---- viewport scaling ------------------------------------ */
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0A0806;
    overflow: hidden;
  }

  .pin-stage {
    width: 1000px; height: 1500px;
    transform-origin: center center;
    position: relative;
    flex-shrink: 0;
  }

  /* ---- photo zone: top 2/3 -------------------------------- */
  .pin-photo {
    position: absolute;
    inset: 0 0 500px 0;
    background: #1E1710;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .pin-photo__label {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(188, 174, 146, 0.35);
    user-select: none;
  }

  /* subtle vignette along bottom of photo */
  .pin-photo::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 220px;
    background: linear-gradient(
      180deg,
      rgba(18, 14, 8, 0) 0%,
      rgba(18, 14, 8, 0.25) 40%,
      rgba(18, 14, 8, 0.75) 80%,
      #120E08 100%
    );
    pointer-events: none;
  }

  /* ---- badge mark: top-right ------------------------------ */
  .pin-badge {
    position: absolute;
    top: 36px; right: 36px;
    width: 80px; height: 80px;
    z-index: 2;
    opacity: 0.92;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.55));
  }

  /* ---- text zone: bottom 1/3 ------------------------------ */
  .pin-text {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 500px;
    background: #120E08;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 80px;
    text-align: center;
  }

  /* category label */
  .pin-category {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #D4832A;
    margin-bottom: 28px;
  }

  /* diamond separator after category */
  .pin-category::after {
    content: "";
    display: block;
    width: 8px; height: 8px;
    background: #D4832A;
    transform: rotate(45deg);
    margin: 20px auto 0;
    opacity: 0.7;
  }

  /* headline */
  .pin-headline {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: #F5EFE0;
    margin: 0;
    max-width: 820px;
    text-wrap: balance;
  }

  /* footer URL */
  .pin-footer {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    text-align: center;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #D4832A;
    opacity: 0.7;
  }

  /* thin amber rule above footer */
  .pin-footer::before {
    content: "";
    display: block;
    width: 60px;
    height: 1px;
    background: rgba(212, 131, 42, 0.35);
    margin: 0 auto 16px;
  }
</style>

<script>
  /* Scale the 1000×1500 pin to fit any viewport */
  function scalePin() {
    const stage = document.querySelector('.pin-stage');
    if (!stage) return;
    const sw = 1000, sh = 1500;
    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.min(vw / sw, vh / sh, 1);
    stage.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', scalePin);
  window.addEventListener('DOMContentLoaded', scalePin);
</script>
</head>
<body>
  <div class="pin-stage">

    <!-- Photo area — top two-thirds -->
    <div class="pin-photo">
      <span class="pin-photo__label">Photo</span>
    </div>

    <!-- Badge mark — top-right -->
    <img class="pin-badge" src="../../assets/logo-badge-full.svg" alt="New England Crust">

    <!-- Text section — bottom third -->
    <div class="pin-text">
      <div class="pin-category">Gear Guide</div>
      <h1 class="pin-headline">The Only Cast Iron Skillet You'll Ever Need</h1>
      <div class="pin-footer">newenglandcrust.com</div>
    </div>

  </div>
</body>
</html>
